<div class="max-w-4xl mx-auto py-12 px-6">
  <div class="flex justify-between items-center mb-12">
    <div>
      <h1 class="text-4xl font-bold mb-2">Timeline</h1>
      <p class="opacity-70 text-lg text-secondary font-medium italic">Your journey, day by day.</p>
    </div>
    <div class="hidden sm:block">
        <i class="fa-solid fa-timeline text-5xl opacity-20 text-neutral"></i>
    </div>
  </div>

  <div class="flex flex-col items-center justify-center py-20 bg-base-200/50 rounded-box border-2 border-dashed border-base-300">
    <div class="w-20 h-20 bg-base-300 text-base-content/30 rounded-full flex items-center justify-center mb-6">
        <i class="fa-solid fa-calendar-day text-3xl"></i>
    </div>
    <h2 class="text-2xl font-semibold opacity-50">No ratings yet</h2>
    <p class="opacity-40 mt-2 mb-8">Start tracking your mood today!</p>
    <a routerLink="/">
        <button  class="btn btn-primary">
            <i class="fa-solid fa-plus"></i>
            Rate Your Day
        </button>
    </a>
  </div>
</div>

<app-password-dialog
  [isOpen]="showPasswordEntry()"
  (submitted)="handleModalSubmit($event)"
  (canceled)="showPasswordEntry.set(false)"
/>
