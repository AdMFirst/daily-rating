<div class="max-w-5xl mx-auto">
  <div class="flex justify-between items-center mb-6">
    <div class="md:flex md:flex-row md:items-center gap-2">
      <h1 class="text-4xl text-base-content font-bold mb-2">Timeline</h1>
      <div class="badge badge-soft bagde-secondary">Your journey, day by day.</div>
    </div>
    <div class="hidden sm:block">
        <i class="fa-solid fa-timeline text-4xl text-base-content"></i>
    </div>
  </div>

  <div class="flex flex-col card px-12 py-6 bg-base-200 items-center justify-center container">
    <div class="w-20 h-20 bg-base-300  rounded-full flex items-center justify-center mb-6">
        <i class="fa-solid fa-calendar-day text-3xl"></i>
    </div>
    <h2 class="text-2xl font-semibold opacity-50">No ratings yet</h2>
    <p class="opacity-40 mt-2 mb-8">Start tracking your mood today!</p>
    <a routerLink="/">
        <button  class="btn btn-primary">
            <i class="fa-solid fa-plus"></i>
            Rate Your Day
        </button>
    </a>
  </div>
</div>

<app-password-dialog
  [isOpen]="showPasswordEntry()"
  (submitted)="handleModalSubmit($event)"
  (canceled)="showPasswordEntry.set(false)"
/>
